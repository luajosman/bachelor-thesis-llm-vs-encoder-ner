experiment_name: qwen3-14b-qlora
model_name: Qwen/Qwen3-14B
lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
use_qlora: true
attn_impl: flash_attention_2   # OK fuer Qwen3 (nicht 3.5)
learning_rate: 2e-4
batch_size: 4
grad_accum: 4
epochs: 3
max_seq_length: 512
weight_decay: 0.01
warmup_ratio: 0.1
use_wandb: true
seed: 42
output_dir: results/qwen3-14b-qlora
