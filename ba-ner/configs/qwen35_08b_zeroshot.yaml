# Qwen3.5-0.8B — Zero-Shot Baseline (kein Training)
# Hauptbenchmark: MultiNERD (englisch)
#
# Diese Config startet KEIN Training. Sie wird nur fuer
# src.decoder.inference --zeroshot benoetigt und liefert eine
# vergleichbare Baseline ohne Adapter.

experiment_name: qwen35-08b-zeroshot
model_name: Qwen/Qwen3.5-0.8B
model_type: decoder
mode: zeroshot     # Inference-Skript erkennt diesen Mode automatisch

# Datensatz
dataset: multinerd
dataset_language: en

# 4-bit-Quantisierung spart VRAM auch im Zero-Shot Mode
use_qlora: true
attn_impl: sdpa

# Generierung — greedy/deterministisch fuer Reproduzierbarkeit
max_new_tokens: 256

# Kein Training, daher keine LoRA-/Trainings-Hyperparameter noetig.

# Reproduzierbarkeit
seed: 42

# Ausgabe
output_dir: results/multinerd/qwen35-08b-zeroshot
