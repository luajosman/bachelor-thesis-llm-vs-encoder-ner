# Qwen3.5-0.8B — Kleinstes LLM mit QLoRA fuer NER
# Hauptbenchmark: MultiNERD (englisch)
#
# Motivation: kleines LLM, dessen Gesamtgroessenordnung (~0.8B Parameter)
# in der Naehe von DeBERTa-v3-large (~435M Parameter) liegt. Erlaubt einen
# fairen Vergleich "kleines LLM mit LoRA" vs. "grosses Encoder-Modell".

experiment_name: qwen35-08b-qlora
model_name: Qwen/Qwen3.5-0.8B
model_type: decoder
mode: lora

# Datensatz
dataset: multinerd
dataset_language: en

# Quantisierung & Attention
use_qlora: true
attn_impl: sdpa    # sdpa fuer Qwen3.5 (NICHT flash_attention_2)

# LoRA-Konfiguration — Standardrang fuer kleines Modell
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training — etwas hoehere LR und groessere Batches als 4B,
# da das Modell deutlich kleiner ist
num_train_epochs: 3
learning_rate: 3e-4
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
gradient_accumulation_steps: 2
warmup_ratio: 0.05
lr_scheduler_type: cosine
weight_decay: 0.01

# Effizienz
gradient_checkpointing: true
packing: false
max_seq_length: 1024

# Evaluation & Checkpointing
eval_strategy: epoch
save_strategy: epoch
save_total_limit: 2

# Generative Dev-Evaluation: Anzahl Samples pro Epoche
gen_eval_max_samples: 200

# Logging
logging_steps: 25
use_wandb: false

# Reproduzierbarkeit
seed: 42

# Ausgabe
output_dir: results/multinerd/qwen35-08b-qlora
