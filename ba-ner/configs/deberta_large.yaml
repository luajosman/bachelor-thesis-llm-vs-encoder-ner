# DeBERTa-v3-large — Groesseres Encoder-Modell fuer NER
# Hauptbenchmark: MultiNERD (englisch)
# Zusatzbenchmark: python -m src.encoder.train configs/deberta_large.yaml --dataset wnut_17

experiment_name: deberta-v3-large
model_name: microsoft/deberta-v3-large
model_type: encoder

# Datensatz
dataset: multinerd
dataset_language: en

# Tokenisierung
max_length: 256

# Training — konservativere Hyperparameter als base wegen Modellgroesse
learning_rate: 8e-6
num_train_epochs: 4
per_device_train_batch_size: 8
per_device_eval_batch_size: 16
gradient_accumulation_steps: 2
weight_decay: 0.01
warmup_ratio: 0.06
lr_scheduler_type: linear

# Evaluation & Checkpointing
eval_strategy: epoch
save_strategy: epoch
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: f1
greater_is_better: true

# Mixed Precision
fp16: true

# Logging
logging_steps: 50
use_wandb: false

# Early Stopping
early_stopping_patience: 1

# Reproduzierbarkeit
seed: 42

# Ausgabe
output_dir: results/multinerd/deberta-v3-large
