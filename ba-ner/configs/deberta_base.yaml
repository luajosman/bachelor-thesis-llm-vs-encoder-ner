# DeBERTa-v3-base — Encoder-Baseline fuer NER
# Hauptbenchmark: MultiNERD (englisch)

experiment_name: deberta-v3-base
model_name: microsoft/deberta-v3-base
model_type: encoder

# Datensatz
dataset: multinerd
dataset_language: en

# Tokenisierung
max_length: 256

# Training
learning_rate: 2e-5
num_train_epochs: 5
per_device_train_batch_size: 16
per_device_eval_batch_size: 32
gradient_accumulation_steps: 1
weight_decay: 0.01
warmup_ratio: 0.1
lr_scheduler_type: linear

# Evaluation & Checkpointing
eval_strategy: epoch
save_strategy: epoch
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: f1
greater_is_better: true

# Mixed Precision (bf16 wird automatisch bevorzugt wenn verfuegbar)
fp16: true

# Logging
logging_steps: 50
use_wandb: false

# Early Stopping
early_stopping_patience: 1

# Reproduzierbarkeit
seed: 42

# Ausgabe
output_dir: results/multinerd/deberta-v3-base
