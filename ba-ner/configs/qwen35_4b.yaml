# Qwen3.5-4B — Mittelgrosses LLM mit QLoRA fuer NER
# Hauptbenchmark: MultiNERD (englisch)

experiment_name: qwen35-4b-qlora
model_name: Qwen/Qwen3.5-4B
model_type: decoder
mode: lora

# Datensatz
dataset: multinerd
dataset_language: en

# Quantisierung & Attention
use_qlora: true
attn_impl: sdpa    # sdpa fuer Qwen3.5 (NICHT flash_attention_2)

# LoRA-Konfiguration
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training
num_train_epochs: 3
learning_rate: 2e-4
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
warmup_ratio: 0.05
lr_scheduler_type: cosine
weight_decay: 0.01

# Effizienz
gradient_checkpointing: true
packing: false
max_seq_length: 1024

# Evaluation & Checkpointing
eval_strategy: epoch
save_strategy: epoch
save_total_limit: 2

# Generative Dev-Evaluation: Anzahl Samples pro Epoche
gen_eval_max_samples: 200

# Logging
logging_steps: 25
use_wandb: false

# Reproduzierbarkeit
seed: 42

# Ausgabe
output_dir: results/multinerd/qwen35-4b-qlora
